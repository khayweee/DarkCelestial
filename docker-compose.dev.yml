services:
  backend:
    volumes:
      - ./server:/app
    # Override command to run with reload enabled
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]

  frontend:
    # Target the builder stage for development containing all development dependencies
    build:
      target: builder
    volumes:
      - ./client:/app
    environment:
      - NODE_ENV=development
    # Ensure dependencies are installed and run the dev server
    command: sh -c "npm install && npm run dev"
